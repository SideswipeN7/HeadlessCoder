<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf9f5" />
  <title>HeadlessCoder — sign in</title>
  <style>
    :root { --primary:#cc785c; --primary-active:#a9583e; --canvas:#faf9f5; --card:#efe9de;
            --ink:#141413; --body:#3d3d3a; --muted:#6c6a64; --hairline:#e6dfd8; --error:#c64545; }
    @media (prefers-color-scheme: dark) {
      :root { --canvas:#1a1918; --card:#2a2724; --ink:#f5f1ea; --body:#d9d4cb; --muted:#a5a096; --hairline:#35312d; }
    }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100dvh; display:flex; align-items:center; justify-content:center;
           background:var(--canvas); color:var(--body); font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif; }
    .card { width:min(380px,92vw); background:var(--canvas); border:1px solid var(--hairline);
            border-radius:16px; padding:32px; text-align:center; }
    .mark { font-size:30px; color:var(--primary); }
    h1 { font-family:Georgia,"Times New Roman",serif; font-weight:400; font-size:26px; letter-spacing:-0.5px;
         color:var(--ink); margin:12px 0 4px; }
    p { color:var(--muted); font-size:14px; margin:0 0 20px; }
    input { width:100%; font:inherit; font-size:16px; color:var(--ink); background:var(--canvas);
            border:1px solid var(--hairline); border-radius:8px; padding:11px 14px; }
    input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(204,120,92,0.15); }
    button { width:100%; margin-top:12px; font:inherit; font-size:15px; font-weight:500; color:#fff;
             background:var(--primary); border:none; border-radius:8px; padding:12px; cursor:pointer; }
    button:hover { background:var(--primary-active); }
    .err { color:var(--error); font-size:13px; min-height:18px; margin-top:10px; }
  </style>
</head>
<body>
  <form class="card" id="form">
    <div class="mark">✳</div>
    <h1>HeadlessCoder</h1>
    <p>Enter the access password shown in the host's console.</p>
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password" autofocus />
    <button type="submit">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    const form = document.getElementById("form");
    const err = document.getElementById("err");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.textContent = "";
      const password = document.getElementById("pw").value;
      try {
        const r = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        if (r.ok) {
          const ret = new URLSearchParams(location.search).get("return");
          let dest = "/hc";
          if (ret && ret.startsWith("/")) dest = ret;   // same-origin path only
          window.location.assign(dest);
        }
        else { err.textContent = "Incorrect password."; }
      } catch { err.textContent = "Could not reach the server."; }
    });
  </script>
</body>
</html>
